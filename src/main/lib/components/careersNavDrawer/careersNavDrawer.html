<div class="nav-drawer">
    <input type="checkbox" id="nav-drawer-toggle" class="nav-drawer__toggle">
    <label for="nav-drawer-toggle" class="nav-drawer__pull" data-i18n-aria-label="a11y.navDrawerOpen" aria-label="Открыть разделы">
        <svg class="nav-drawer__pull-icon" viewBox="0 0 22 22" fill="none" aria-hidden="true">
            <use href="/assets/sprite/sprite-svg.svg#icon-nav-pull"></use>
        </svg>
    </label>
    <label for="nav-drawer-toggle" class="nav-drawer__overlay" aria-hidden="true"></label>
    <div class="nav-drawer__panel" role="dialog" data-i18n-aria-label="a11y.navDrawerPanel" aria-label="Разделы">
        <label for="nav-drawer-toggle" class="nav-drawer__close">
            <span data-i18n="a11y.navDrawerClose">ЗАКРЫТЬ</span>
            <svg class="nav-drawer__close-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <use href="/assets/sprite/sprite-svg.svg#icon-close-sm"></use>
            </svg>
        </label>
        <div class="nav-drawer__items">
            <a href="<%= htmlWebpackPlugin.options.routes.careers %>" class="nav-drawer__item" data-i18n="careers.nav.offer">Что мы предлагаем</a>
            <a href="<%= htmlWebpackPlugin.options.routes.careersAbout %>" class="nav-drawer__item" data-i18n="careers.nav.about">О банке</a>
            <a href="<%= htmlWebpackPlugin.options.routes.careersJobs %>" class="nav-drawer__item" data-i18n="careers.nav.jobs">Открытые вакансии</a>
            <a href="<%= htmlWebpackPlugin.options.routes.careersInternship %>" class="nav-drawer__item" data-i18n="careers.nav.internship">Стажировка и&nbsp;практика</a>
        </div>
    </div>
</div>
