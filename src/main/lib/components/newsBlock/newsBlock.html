<div class="fts-news-slider">
    <div class="swiper fts-news-slider__swiper" data-slider="news">
        <div class="swiper-wrapper">
            <% sharedNews.forEach(function(n, i) { %>
            <a href="<%= n.href %>" class="swiper-slide fts-news__card">
                <div class="fts-news__media" style="background-image: url('<%= n.image %>');"></div>
                <div class="fts-news__body">
                    <div class="fts-news__meta">
                        <time class="fts-news__date" data-i18n="shared.news.<%= i %>.date"><%- n.date %></time>
                        <span class="fts-news__tag" data-i18n="shared.news.<%= i %>.tag"><%- n.tag %></span>
                    </div>
                    <p class="fts-news__title" data-i18n="shared.news.<%= i %>.title"><%- n.title %></p>
                </div>
            </a>
            <% }); %>
        </div>
    </div>
    <div class="fts-controls fts-controls--news">
        <div class="nav-slider">
            <button type="button" class="nav-slider__button" data-news-prev data-i18n-aria-label="a11y.sliderPrev" aria-label="Предыдущий">
                <svg class="nav-slider__icon" aria-hidden="true">
                    <use href="/assets/sprite/sprite-svg.svg#icon-slider-prev"></use>
                </svg>
            </button>
            <button type="button" class="nav-slider__button" data-news-next data-i18n-aria-label="a11y.sliderNext" aria-label="Следующий">
                <svg class="nav-slider__icon" aria-hidden="true">
                    <use href="/assets/sprite/sprite-svg.svg#icon-slider-next"></use>
                </svg>
            </button>
        </div>
        <div class="fts-controls__pagination" data-news-pagination></div>
        <a href="#" class="button-arrow button-arrow--mob-full">
            <span class="button-arrow__text" data-i18n="shared.newsAllLink">Смотреть все новости</span>
            <svg class="button-arrow__icon" aria-hidden="true">
                <use href="/assets/sprite/sprite-svg.svg#icon-arrow-more"></use>
            </svg>
        </a>
    </div>
</div>
